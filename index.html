<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOM Replacer with Base</title>
</head>
<body>
<h1></h1>
<script>
// URL of the HTML to load
const htmlUrl = "http://localhost:8000/u-a1b2c3d4e5f6/";

fetch(htmlUrl)
    .then(response => {
        if (!response.ok) throw new Error("Failed to fetch HTML");
        return response.text();
    })
    .then(html => {
        // Create a temporary DOM to insert a <base> tag
        const temp = document.createElement('html');
        temp.innerHTML = html;

        // Add <base> to the <head> so relative URLs resolve correctly
        let head = temp.querySelector('head');
        if (!head) {
            head = document.createElement('head');
            temp.insertBefore(head, temp.firstChild);
        }

        const base = document.createElement('base');
        base.href = htmlUrl;
        head.insertBefore(base, head.firstChild);

        // Replace the current page's DOM
        document.open();
        document.write(temp.innerHTML);
        document.close();
    })
    .catch(err => {
        console.error(err);
        document.body.innerHTML = "<h1>Failed to load external HTML</h1>";
    });
</script>
</body>
</html>
